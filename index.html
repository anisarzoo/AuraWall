<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraWall | Unique Daily Wallpapers</title>
    <meta name="description" content="Generate unique, high-resolution generative art wallpapers daily. Works locally and supports all screen sizes.">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <canvas id="wallpaper-canvas"></canvas>
        
        <div class="overlay">
            <header>
                <div class="logo">AuraWall</div>
                <div class="date-display" id="current-date">March 17, 2026</div>
            </header>

            <main>
                <div class="hero-text">
                    <h1>Your daily window to <span>infinite</span> art.</h1>
                    <p>Always unique. Always yours.</p>
                </div>
            </main>

            <div class="controls-panel">
                <div class="control-group">
                    <button id="generate-btn" class="primary-btn" title="Generate New">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 1-9 9 9 9 0 0 1-9-9 9 9 0 0 1 9-9 9 9 0 0 1 9 9Z"/><path d="m9 12 2 2 4-4"/></svg>
                        Generate New
                    </button>
                    <button id="download-btn" class="secondary-btn" title="Download">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                    </button>
                </div>
                
                <div class="custom-dropdown" id="pattern-dropdown">
                    <button class="dropdown-trigger" id="dropdown-trigger">
                        <span id="current-pattern">Aurora Drift</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                    </button>
                    <ul class="dropdown-menu" id="dropdown-menu">
                        <li data-value="aurora" class="active">Aurora Drift</li>
                        <li data-value="geometric">Geometric Echo</li>
                        <li data-value="nebula">Nebula Mist</li>
                        <li data-value="minimal">Silk Minimal</li>
                    </ul>
                </div>

                <div class="advanced-toggle" id="settings-toggle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                </div>

                <div class="settings-panel" id="settings-panel">
                    <div class="setting-item">
                        <label>Complexity</label>
                        <input type="range" id="complexity-slider" min="1" max="100" value="50">
                    </div>
                    <div class="setting-item">
                        <label>Hue Variation</label>
                        <input type="range" id="hue-slider" min="0" max="360" value="30">
                    </div>
                    <div class="setting-item checkbox">
                        <label>Living Wallpaper</label>
                        <input type="checkbox" id="animate-toggle" checked>
                    </div>
                </div>
            </div>

            <footer>
                <p>Resolution: <span id="resolution-info">1920 x 1080</span></p>
            </footer>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
